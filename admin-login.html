<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion Admin | Digitall Booster</title>
    <meta name="description" content="Connexion administrateur Digitall Booster" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/admin.css" />
  </head>
  <body class="login-page">
    <main class="login-wrap">
      <section class="login-card">
        <h1>Connexion Admin</h1>
        <p>Connecte-toi pour acceder au dashboard CMS.</p>
        <form id="loginForm" class="login-form">
          <label>Email admin
            <input id="loginEmail" type="email" placeholder="admin@exemple.com" required />
          </label>
          <label>Mot de passe
            <input id="loginPassword" type="password" placeholder="Mot de passe" required />
          </label>
          <button class="btn btn-primary" type="submit">Se connecter</button>
        </form>
        <p id="loginStatus" class="status" role="status" aria-live="polite"></p>
        <a href="./index.html" class="back">← Retour au site</a>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./data/cms-config.js"></script>
    <script src="./data/content-default.js"></script>
    <script src="./js/cms-api.js"></script>
    <script src="./js/admin-login.js"></script>
  </body>
</html>
